<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Code Generator</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
    background: #f5f5f5;
  }

  h2 { margin-bottom: 10px; }

  input {
    width: 360px;
    padding: 10px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }

  button {
    margin-top: 10px;
    padding: 10px 18px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
    border: none;
    background: #333;
    color: white;
  }

  button:hover { background: #555; }

  .wrapper {
    display: flex;
    gap: 30px;
    margin-top: 30px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .qr-block {
    text-align: center;
    background: white;
    padding: 16px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    width: 220px;
  }

  .qr-block h3 {
    margin: 0 0 12px;
    font-size: 14px;
    color: #444;
  }

  /* Preview image — always crisp 200px regardless of source size */
  .qr-preview {
    width: 200px;
    height: 200px;
    image-rendering: pixelated;  /* keeps QR sharp when scaled down */
    display: block;
    margin: 0 auto;
    border: 1px solid #eee;
  }

  .qr-meta {
    font-size: 11px;
    color: #999;
    margin-top: 6px;
  }

  a.dl-link {
    display: inline-block;
    margin-top: 10px;
    color: #0066cc;
    font-size: 13px;
    text-decoration: underline;
    cursor: pointer;
  }

  #downloadAllBtn {
    margin-top: 30px;
    background: #0066cc;
  }

  #downloadAllBtn:hover { background: #0052a3; }
</style>
</head>
<body>

<h2>QR Code Generator</h2>
<input id="urlInput" placeholder="Enter a link...">
<button onclick="generateAll()">Generate</button>

<div class="wrapper">
  <div id="small" class="qr-block"></div>
  <div id="a4"    class="qr-block"></div>
  <div id="a6"    class="qr-block"></div>
</div>

<button id="downloadAllBtn" style="display:none;" onclick="downloadAll()">
  ⬇ Download ALL
</button>

<script>
const results = {};

function generateAll() {
  const url = document.getElementById("urlInput").value.trim();
  if (!url) { alert("Please enter a link"); return; }

  ["small","a4","a6"].forEach(id => document.getElementById(id).innerHTML = "");
  Object.keys(results).forEach(k => delete results[k]);

  // size = actual export pixel size; label = display label; sub = size hint for user
  createQR("small", "Small (256px)",     256,  "qr_small.png", url);
  createQR("a4",    "A4 Print (2000px)", 2000, "qr_A4.png",   url);
  createQR("a6",    "A6 Print (1000px)", 1000, "qr_A6.png",   url);

  document.getElementById("downloadAllBtn").style.display = "block";
}

function createQR(containerId, title, size, filename, url) {
  QRCode.toCanvas(url, { width: size, margin: 2 }, function(err, canvas) {
    if (err) { console.error(err); return; }

    // Convert full-size canvas → data URL (for download + crisp preview)
    const dataUrl = canvas.toDataURL("image/png");
    results[filename] = dataUrl;

    const box = document.getElementById(containerId);

    const h3 = document.createElement("h3");
    h3.innerText = title;

    // Use <img> for preview — scales cleanly from any resolution
    const img = document.createElement("img");
    img.src = dataUrl;
    img.className = "qr-preview";
    img.alt = "QR Code";

    const meta = document.createElement("p");
    meta.className = "qr-meta";
    meta.innerText = `${size} × ${size} px`;

    const link = document.createElement("a");
    link.className = "dl-link";
    link.innerText = "Download";
    link.download = filename;
    link.href = dataUrl;

    box.appendChild(h3);
    box.appendChild(img);
    box.appendChild(meta);
    box.appendChild(link);
  });
}

function downloadAll() {
  Object.entries(results).forEach(([name, data]) => {
    const a = document.createElement("a");
    a.href = data;
    a.download = name;
    a.click();
  });
}
</script>
</body>
</html>
