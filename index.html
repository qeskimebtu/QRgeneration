<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Code Generator</title>

<!-- QR Library -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 40px;
}

h2 {
  margin-bottom: 10px;
}

input {
  width: 360px;
  padding: 10px;
  font-size: 16px;
}

button {
  margin-top: 10px;
  padding: 10px 18px;
  font-size: 16px;
  cursor: pointer;
}

.wrapper {
  display: flex;
  gap: 30px;
  margin-top: 30px;
  flex-wrap: wrap;
  justify-content: center;
}

.qr-block {
  text-align: center;
  width: 260px;
}

.qr-preview {
  width: 220px;    
  height: auto;
  margin-top: 10px;
  border: 1px solid #ccc;
}

a {
  display: block;
  margin-top: 8px;
  color: blue;
  cursor: pointer;
  text-decoration: underline;
}

#downloadAllBtn {
  margin-top: 30px;
}
</style>
</head>

<body>

<h2>QR Code Generator</h2>

<input id="urlInput" placeholder="Enter a link...">
<button onclick="generateAll()">Generate</button>

<div class="wrapper">
  <div id="small" class="qr-block"></div>
  <div id="a4" class="qr-block"></div>
  <div id="a6" class="qr-block"></div>
</div>

<button id="downloadAllBtn" style="display:none;" onclick="downloadAll()">
  Download ALL
</button>

<script>

const results = {};

function generateAll() {

  const url = document.getElementById("urlInput").value.trim();
  if (!url) {
    alert("Please enter a link");
    return;
  }

  document.getElementById("small").innerHTML = "";
  document.getElementById("a4").innerHTML = "";
  document.getElementById("a6").innerHTML = "";
  Object.keys(results).forEach(k => delete results[k]);

  createQR("small", "Small (256px)", 256, "qr_small.png", url);
  createQR("a4", "A4 Print", 2000, "qr_A4.png", url);
  createQR("a6", "A6 Landscape", 1000, "qr_A6.png", url);

  document.getElementById("downloadAllBtn").style.display = "block";
}

function createQR(containerId, title, size, filename, url) {

  QRCode.toCanvas(url, { width: size }, function (err, canvas) {

    if (err) {
      console.error(err);
      alert("QR generation error");
      return;
    }

    const box = document.getElementById(containerId);

    const h3 = document.createElement("h3");
    h3.innerText = title;

    canvas.classList.add("qr-preview");

    const link = document.createElement("a");
    link.innerText = "Download";
    link.download = filename;
    link.href = canvas.toDataURL("image/png");

    box.appendChild(h3);
    box.appendChild(canvas);
    box.appendChild(link);

    results[filename] = link.href;
  });
}

function downloadAll() {
  Object.entries(results).forEach(([name, data]) => {
    const a = document.createElement("a");
    a.href = data;
    a.download = name;
    a.click();
  });
}

</script>

</body>
</html>
